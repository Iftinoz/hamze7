name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 31
        build-tools-version: '31.0.0'
    
    - name: Install NativeScript CLI
      run: npm install -g nativescript
    
    - name: Install dependencies
      run: npm install
    
    - name: Run linting
      run: npm run lint
      continue-on-error: true
    
    - name: Build Android APK
      run: ns build android --release
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: android-apk
        path: platforms/android/app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Build Android AAB (Android App Bundle)
      run: ns build android --release --aab
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
      continue-on-error: true
    
    - name: Upload AAB artifact
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: android-aab
        path: platforms/android/app/build/outputs/bundle/release/*.aab
        retention-days: 30

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run TypeScript type check
      run: npx tsc --noEmit
      continue-on-error: true
    
    - name: Run linting
      run: npm run lint
      continue-on-error: true
